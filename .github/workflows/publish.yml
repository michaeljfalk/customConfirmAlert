name: Publish to npm

# Publishes the package to npm using the NPM_TOKEN repository secret.
# Trigger either by:
#   - publishing a GitHub Release, or
#   - running this workflow manually (Actions tab → "Publish to npm" → Run workflow).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish (public)
        run: npm publish --access public
        env:
          # setup-node writes an .npmrc that reads this env var as the auth token.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
